name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-test-secret
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      VAULT_MASTER_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      RAILWAY_API_TOKEN: ""
      RAILWAY_PROJECT_ID: ""
      RENDER_API_TOKEN: ""
      FLY_API_TOKEN: ""
      RBAC_ADMIN_KEYS: ""
      RBAC_OPERATOR_KEYS: ""
      RBAC_VIEWER_KEYS: ""
      STRIPE_SECRET_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build frontend
        run: npm ci --prefix frontend && npm run build --prefix frontend

      - name: Run Django tests
        run: python manage.py test core.tests_rbac --parallel 1 -v 2 && python manage.py test --parallel 1 -v 2

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t api-transfer:ci .
